name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permite correr manualmente desde la UI de GitHub Actions.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse vs prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Por ahora informativo — Core Web Vitals contra prod pueden variar por
    # cold starts de Vercel. Cuando tengamos baseline estable (≥1 semana),
    # remover el continue-on-error para hacer gate de merge.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI (3 runs × 4 URLs)
        run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
