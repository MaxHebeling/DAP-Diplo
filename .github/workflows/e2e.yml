name: E2E (smoke)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permite correr a mano desde la UI de GitHub Actions.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke vs prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NO bloquea merge — smoke tests contra prod son informativos. Si
    # querés convertirlo en blocker, remové el continue-on-error.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests against prod
        run: pnpm test:e2e
        env:
          BASE_URL: https://www.dapglobal.org

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
